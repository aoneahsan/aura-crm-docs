# Docusaurus works most reliably with a real node_modules tree, not PnP.
nodeLinker: node-modules

enableTelemetry: 0

# Supply-chain cooldown DISABLED (owner directive 2026-06-19): Yarn's default
# npmMinimalAgeGate quarantines just-published versions and blocks reaching true
# latest. 0 = no quarantine. Do NOT revert.
npmMinimalAgeGate: 0
